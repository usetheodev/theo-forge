apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  name: steps-example
spec:
  entrypoint: pipeline
  templates:
  - name: pipeline
    steps:
    - - name: build
        template: build-tpl
    - - name: test
        template: test-tpl
    - - name: deploy-a
        template: deploy-tpl
      - name: deploy-b
        template: deploy-tpl
  - container:
      image: golang:1.22
    name: build-tpl
  - container:
      image: golang:1.22
    name: test-tpl
  - container:
      image: alpine:3.18
    name: deploy-tpl
