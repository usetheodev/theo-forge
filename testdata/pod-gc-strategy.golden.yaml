apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  generateName: pod-gc-strategy-
spec:
  entrypoint: pod-gc-strategy
  podGC:
    deleteDelayDuration: 30s
    strategy: OnPodSuccess
  templates:
  - name: pod-gc-strategy
    steps:
    - - name: fail
        template: fail
      - name: succeed
        template: succeed
  - container:
      args:
      - exit 1
      command:
      - sh
      - -c
      image: alpine:3.7
    name: fail
  - container:
      args:
      - exit 0
      command:
      - sh
      - -c
      image: alpine:3.7
    name: succeed
