apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  generateName: diamond-
  namespace: argo
spec:
  entrypoint: diamond
  templates:
  - container:
      args:
      - '{{inputs.parameters.msg}}'
      command:
      - echo
      image: alpine:3.18
    inputs:
      parameters:
      - name: msg
    name: echo
  - dag:
      tasks:
      - arguments:
          parameters:
          - name: msg
            value: Task A
        name: A
        template: echo
      - arguments:
          parameters:
          - name: msg
            value: Task B
        depends: A
        name: B
        template: echo
      - arguments:
          parameters:
          - name: msg
            value: Task C
        depends: A
        name: C
        template: echo
      - arguments:
          parameters:
          - name: msg
            value: Task D
        depends: B && C
        name: D
        template: echo
    name: diamond
